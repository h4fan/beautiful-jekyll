<!-- 自动生成目录的脚本与样式 -->
<style>
  .toc-container {
    background: #f8f9fa;
    border-left: 3px solid #0d6efd;
    border-radius: 0.5rem;
    padding: 1rem;
    font-size: 0.9rem;
  }
  .toc-container h5 {
    margin-bottom: 0.75rem;
    font-weight: 600;
  }
  .toc-list {
    padding-left: 0;
    list-style: none;
  }
  .toc-list ul {
    padding-left: 1.2rem;
    list-style: none;
  }
  .toc-list li {
    margin: 0.4rem 0;
  }
  .toc-link {
    text-decoration: none;
    color: #2c3e50;
    display: inline-block;
    transition: color 0.2s;
  }
  .toc-link:hover {
    color: #0d6efd;
    text-decoration: underline;
  }
  .toc-link.level-2 {
    font-weight: 500;
  }
  .toc-link.level-3,
  .toc-link.level-4 {
    font-size: 0.85rem;
    margin-left: 0.25rem;
  }
  /* 移动端适配：目录不显示（已在布局中控制） */
</style>

<script>
  (function() {
    document.addEventListener('DOMContentLoaded', function() {
      // 查找文章主体内容 - 常见容器选择器
      let contentArea = document.querySelector('.blog-post');
      if (!contentArea) contentArea = document.querySelector('.post-content');
      if (!contentArea) contentArea = document.querySelector('article');
      if (!contentArea) return;

      const headings = contentArea.querySelectorAll('h1, h2, h3, h4');
      if (headings.length === 0) return;

      const tocContainer = document.getElementById('toc');
      if (!tocContainer) return;

      tocContainer.innerHTML = '';

      // 为没有 id 的标题自动生成 id
      headings.forEach((heading, idx) => {
        if (!heading.id) {
          let id = heading.innerText.trim()
            .toLowerCase()
            .replace(/[^\w\u4e00-\u9fa5]+/g, '-')
            .replace(/^-+|-+$/g, '');
          if (!id) id = `heading-${idx}`;
          heading.id = id;
        }
      });

      // 构建嵌套目录
      let toc = document.createElement('ul');
      toc.className = 'toc-list';
      let stack = [{ level: 0, element: toc }];

      headings.forEach((heading) => {
        const level = parseInt(heading.tagName.charAt(1));
        const link = document.createElement('a');
        link.href = `#${heading.id}`;
        link.textContent = heading.innerText;
        link.className = `toc-link level-${level}`;
        const li = document.createElement('li');
        li.appendChild(link);

        while (stack[stack.length - 1].level >= level) {
          stack.pop();
        }
        const parent = stack[stack.length - 1].element;
        parent.appendChild(li);

        const nextHeading = headings[Array.from(headings).indexOf(heading) + 1];
        if (nextHeading && parseInt(nextHeading.tagName.charAt(1)) > level) {
          const newUl = document.createElement('ul');
          li.appendChild(newUl);
          stack.push({ level: level, element: newUl });
        }
      });

      tocContainer.appendChild(toc);
    });
  })();
</script>
